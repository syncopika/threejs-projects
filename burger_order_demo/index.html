<!doctype html>
<html>
  <head>
    <title> burger order demo </title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.8" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r120/three.min.js" integrity="sha512-kgjZw3xjgSUDy9lTU085y+UCVPz3lhxAtdOVkcO4O2dKl2VSBcNsQ9uMg/sXIM4SoOmCiYfyFO/n1/3GSXZtSg==" crossorigin="anonymous"></script>
    <script src="../libs/utils.js"></script>
    <script src="../libs/GLTFLoader.js"></script>
    <script src="../libs/threex.keyboardstate.js"></script>
    <script src="../libs/TrackballControls.js"></script>

    <style>
      body {
        text-align: center;
        font-family: monospace;
      }
      
      #container{
        width: 1200px;
        height: 800px;
      }
      
      #orderLog{
        border: 1px solid #ccc;
        margin: 0 auto;
        margin-bottom: 10px;
        width: 50%;
      }
      
      #content {
        display: flex;
        justify-content: center;
        width: 100%;
        height: 100%;
      }
      
      #promptScreen {
        width: 10%;
        border: 1px solid #ddd;
        padding: 5px;
      }
    </style>
  </head>

  <body>
    <h3> burger order demo </h3>

    <div id='content'>
      <div id='container'>
      </div>
      <div id='promptScreen'>
        <p> ordering screen </p>
        <hr />
        <div id='promptScreenText'></div>
        <div id='optionsContainer'></div>
      </div>
    </div>  
    
    <p> order food with the Web Speech API! (Chromium-based browser needed, e.g. Chrome, Edge) </p>
    <button id='orderWithVoice'>order with voice (Chromium-based browser needed)</button>
    <button id='orderWithoutVoice'>order without voice</button>
    <button id='rotate'>rotate</button>
    <button id='test2'>test</button>
    <p id='speechDetectionStatus'></p>
  </body>

  <script type="module" src="index.js">
  </script>
</html>
